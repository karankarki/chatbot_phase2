<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" fill="none" aria-label="exicom">
  <!--
    Exicom wordmark. Per the Brand Identity Guidelines 2.0 the company logo
    is the lowercase 'exicom' wordmark in PP Mori. SVG falls back to Segoe UI
    Variable (the brand-designated digital fallback) when PP Mori is not
    embedded. Use `color` / currentColor to switch between the dark-on-light
    and Reverse-on-Dark variants.
  -->
  <style>
    .wm {
      font-family:
        'PP Mori',
        'Segoe UI Variable Display', 'Segoe UI Variable',
        'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
      font-weight: 600;
      font-size: 48px;
      letter-spacing: -1.6px;
    }
  </style>
  <text x="0" y="44" class="wm" fill="currentColor">exicom</text>
</svg>
